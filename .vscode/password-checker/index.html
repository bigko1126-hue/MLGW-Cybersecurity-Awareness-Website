<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Strength Checker</title>
  <style>
    :root {
      --bg: #f4f7ff;
      --panel: #ffffff;
      --text: #14213d;
      --muted: #60708f;
      --accent: #2563eb;
      --border: #dfe8ff;
      --shadow: 0 24px 70px rgba(20, 33, 61, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #eef4ff 0%, #f8fbff 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .checker-card {
      width: min(620px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    h1 { margin-top: 0; font-size: 1.7rem; }
    p { color: var(--muted); line-height: 1.6; }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      font-size: 1rem;
      margin-top: 8px;
    }

    .meter {
      height: 10px;
      background: #e8f0ff;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 12px;
    }

    .meter > div {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.25s ease, background 0.25s ease;
    }

    .results {
      margin-top: 14px;
      font-weight: 700;
      color: var(--accent);
    }

    .links {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .links a {
      text-decoration: none;
      color: var(--accent);
      background: #eff6ff;
      padding: 8px 12px;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div class="checker-card">
    <h1>Password Strength Checker</h1>
    <p>Type a password below to see how strong it is. A strong password is long, varied, and hard to guess.</p>
    <input id="password" type="password" placeholder="Enter a password" />
    <div class="meter"><div id="meterBar"></div></div>
    <div class="results" id="result">Strength: Not checked yet</div>

    <div class="links">
      <a href="../mainsite/index.html">Main site</a>
      <a href="../dashboard/Dashboard.html">Dashboard</a>
      <a href="../Quiz/Cybersecurity%20Quiz.html">Quiz</a>
    </div>
  </div>

  <script>
    const passwordInput = document.getElementById('password');
    const meterBar = document.getElementById('meterBar');
    const result = document.getElementById('result');

    passwordInput.addEventListener('input', () => {
      const password = passwordInput.value;
      let score = 0;

      if (password.length >= 8) score += 25;
      if (password.length >= 12) score += 15;
      if (/[A-Z]/.test(password)) score += 15;
      if (/[a-z]/.test(password)) score += 15;
      if (/\d/.test(password)) score += 15;
      if (/[^A-Za-z0-9]/.test(password)) score += 15;

      const width = Math.min(score, 100);
      meterBar.style.width = `${width}%`;

      if (width < 50) {
        meterBar.style.background = '#ef4444';
        result.textContent = 'Strength: Weak';
      } else if (width < 80) {
        meterBar.style.background = '#f59e0b';
        result.textContent = 'Strength: Fair';
      } else {
        meterBar.style.background = '#10b981';
        result.textContent = 'Strength: Strong';
      }
    });
  </script>
</body>
</html>
