name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Pages site
        run: |
          mkdir -p site
          cp -R .vscode/mainsite/. site/
          mkdir -p site/Quiz
          cp -R .vscode/Quiz/. site/Quiz/
          mkdir -p site/dashboard
          cp -R .vscode/dashboard/. site/dashboard/
          mkdir -p site/password-checker
          cp -R .vscode/password-checker/. site/password-checker/
          mkdir -p site/simulator
          cp -R .vscode/simulator/. site/simulator/
          cp .vscode/visitor-tracker.js site/visitor-tracker.js
          if [ -f CNAME ]; then cp CNAME site/CNAME; fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
